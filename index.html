<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>STEM71</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#050505;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
    overflow-x:hidden;

}


header{

    min-height:100vh;
    padding:60px 20px;

    background:
    radial-gradient(circle,
    rgba(255,0,0,.35),
    transparent 35%),

    linear-gradient(
    145deg,
    #000,
    #0b0000,
    #000
    );

}



.profile-pic{

    width:170px;
    height:170px;

    border-radius:50%;

    object-fit:cover;

    border:5px solid red;

    box-shadow:
    0 0 30px red;

}



.logo{

    margin-top:35px;

    font-size:70px;

    font-weight:900;

    letter-spacing:5px;

    color:white;

    text-shadow:
    0 0 10px red,
    0 0 30px red;

}



.crown{

    color:red;

    font-size:35px;

    position:absolute;

    margin-left:-30px;

    margin-top:-35px;

    transform:rotate(-20deg);

}



.tagline{

    margin-top:20px;

    font-size:20px;

    color:#bbb;

}



.enter{

    margin-top:50px;

    padding:18px 55px;

    border-radius:50px;

    border:none;

    background:red;

    color:white;

    font-size:22px;

    font-weight:bold;

    cursor:pointer;

    animation:pulse 2s infinite;

}



@keyframes pulse{

    0%{
        box-shadow:0 0 10px red;
    }

    50%{
        box-shadow:0 0 40px red;
    }

    100%{
        box-shadow:0 0 10px red;
    }

}



.menu{

    margin-top:50px;

    display:flex;

    flex-direction:column;

    gap:20px;

}



.menu a{

    text-decoration:none;

    color:white;

    border:2px solid red;

    padding:18px;

    border-radius:40px;

    font-size:22px;

    font-weight:bold;

    transition:.3s;

}



.menu a:hover{

    background:red;

    box-shadow:0 0 25px red;

}



section{

    padding:80px 20px;

}



h2{

    font-size:40px;

}



.red{

    color:red;

}



</style>

</head>



<body>



<header>


<img src="Screenshot_20260507-204535.jpg" class="profile-pic">


<h1 class="logo">

STEM<span class="crown">♛</span>71

</h1>



<p class="tagline">

From The Ghetto To Greatness

</p>



<button class="enter" onclick="showMenu()">

ENTER MY WORLD

</button>



<div class="menu" id="menu">


<a href="music.html">🎵 MUSIC</a>

<a href="portfolio.html">🎬 PORTFOLIO</a>

<a href="store.html">🛒 STORE</a>

<a href="gallery.html">📸 GALLERY</a>

<a href="services.html">🎨 SERVICES</a>

<a href="booking.html">🤝 BOOK ME</a>

<a href="contact.html">📞 CONTACT</a>


</div>


</header>




<section>


<h2>

About <span class="red">Me</span>

</h2>


<p>

I'm a street-born creative building a vision through music, editing and fashion.

</p>


</section>




<script>


function showMenu(){

document.getElementById("menu").style.display="flex";

}


</script>



</body>

</html>
