<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My World</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0a0a;
  color: white;
  text-align: center;
}

header {
  padding: 60px 20px;
}

h1 {
  font-size: 40px;
}

.red {
  color: #ff1a1a;
}

section {
  padding: 50px 20px;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: #1a1a1a;
  padding: 25px;
  border-radius: 15px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px);
  border: 1px solid #ff1a1a;
}

.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 20px;
  background: #ff1a1a;
  color: white;
  border-radius: 20px;
  text-decoration: none;
}
</style>

</head>

<body>

<header>
  <h1>Welcome to My <span class="red">World</span></h1>
  <p>Choose your path</p>
</header>

<section>
  <div class="container">

    <div class="card">
      <h3>🎤 Music</h3>
      <p>My latest tracks</p>
      <a href="#" class="btn">Listen</a>
    </div>

    <div class="card">
      <h3>🎬 Work</h3>
      <p>My creative projects</p>
      <a href="#" class="btn">View</a>
    </div>

    <div class="card">
      <h3>👕 Merch</h3>
      <p>Artstem clothing</p>
      <a href="#" class="btn">Shop</a>
    </div>

    <div class="card">
      <h3>📞 Bookings</h3>
      <p>Work with me</p>
      <a href="#" class="btn">Contact</a>
    </div>

  </div>
</section>

</body>
  </html>
